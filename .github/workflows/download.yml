name: Download Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: '镜像名称'
        required: true
        type: string
        default: 'ubuntu:22.04'  # <--- 只需要把这里改成你想要的通用镜像

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Docker image
        run: |
          docker pull ${{ github.event.inputs.image_name }}
          
      - name: Sanitize Image Name
        id: sanitize
        run: |
          SAFE_NAME=$(echo "${{ github.event.inputs.image_name }}" | sed 's/[\/:]/_/g')
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          
      - name: Save Docker image to tar
        run: |
          docker save "${{ github.event.inputs.image_name }}" -o "${{ steps.sanitize.outputs.safe_name }}.tar"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.safe_name }}
          path: "*.tar"
